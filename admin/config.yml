backend:
  name: github
  repo: bramdier/abrahamdier
  branch: main
  base_url: https://abrahamdier-oauth.vercel.app
  auth_endpoint: auth

media_folder: uploads
public_folder: /uploads

collections:
  - name: blog
    label: Blog Posts
    folder: content/blog
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    preview_path: "blog/{{slug}}"
    fields:
      - label: Title
        name: title
        widget: string
      - label: Slug
        name: slug
        widget: string
        hint: URL path, e.g. my-post-title. Use lowercase, numbers, and hyphens only.
        pattern: ['^[a-z0-9]+(?:-[a-z0-9]+)*$', 'Use lowercase letters, numbers, and hyphens only.']
        required: true
      - label: Publish Date
        name: date
        widget: datetime
      - label: Description
        name: description
        widget: text
        required: false
      - label: Draft
        name: draft
        widget: boolean
        default: false
      - label: Body
        name: body
        widget: markdown
